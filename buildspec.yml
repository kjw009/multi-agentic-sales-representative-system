version: 0.2

# Requires the CodeBuild project to have:
#   - Environment: aws/codebuild/standard:7.0 (Python 3.12, Node 20, Docker)
#   - Privileged mode enabled (for docker build)
#   - Environment variables: AWS_REGION, EC2_INSTANCE_ID
#   - (Optional) S3 cache bucket configured to use the cache section below

phases:
  install:
    runtime-versions:
      python: "3.12"
      nodejs: "20"
    commands:
      - pip install uv --quiet
      - uv sync --extra dev
      - npm --prefix apps/web ci

  pre_build:
    on-failure: ABORT
    commands:
      # Lint & format
      - uv run ruff check .
      - uv run ruff format --check .
      # Type check
      - uv run mypy apps packages workers
      # Tests (all mock-based, no live DB needed)
      - JWT_SECRET_KEY=ci-test-secret uv run pytest --cov
      # Validate Dockerfile builds (requires privileged mode)
      - docker build .
      # Frontend type check + build
      - npm --prefix apps/web run build

  build:
    on-failure: ABORT
    commands:
      - |
        CMD_ID=$(aws ssm send-command \
          --region $AWS_REGION \
          --instance-ids $EC2_INSTANCE_ID \
          --document-name "AWS-RunShellScript" \
          --parameters '{"commands":[
            "cd /home/ubuntu/multi-agentic-sales-representative-system",
            "git pull origin main",
            "sudo docker compose up -d --no-build",
            "sudo docker compose build api",
            "sudo docker compose up -d"
          ]}' \
          --output text \
          --query "Command.CommandId")
      - echo "SSM command $CMD_ID dispatched"
      - |
        for i in $(seq 1 30); do
          STATUS=$(aws ssm get-command-invocation \
            --region $AWS_REGION \
            --command-id $CMD_ID \
            --instance-id $EC2_INSTANCE_ID \
            --query "Status" --output text 2>/dev/null || echo "Pending")
          echo "[$i/30] $STATUS"
          if [ "$STATUS" = "Success" ]; then exit 0; fi
          if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
            aws ssm get-command-invocation \
              --region $AWS_REGION \
              --command-id $CMD_ID \
              --instance-id $EC2_INSTANCE_ID \
              --query "StandardErrorContent" --output text
            exit 1
          fi
          sleep 10
        done
        echo "Timed out waiting for deploy"
        exit 1

cache:
  paths:
    - "/root/.cache/uv/**/*"
    - "apps/web/node_modules/**/*"
