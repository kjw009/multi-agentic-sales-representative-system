version: 0.2

# Requires the CodeBuild project to have:
#   - Environment: LINUX_EC2 (Docker works natively, no privileged mode needed)
#   - Environment variables: AWS_REGION, EC2_INSTANCE_ID
#   - (Optional) S3 cache bucket configured to use the cache section below

phases:
  install:
    runtime-versions:
      python: "3.12"
      nodejs: "20"
    commands:
      - pip install uv --quiet
      - uv sync --extra dev --no-group dev
      - npm --prefix apps/web ci

  pre_build:
    on-failure: ABORT
    commands:
      # Lint & format
      - uv run ruff check .
      - uv run ruff format --check .
      # Type check
      - uv run mypy apps packages workers
      # Tests (all mock-based, no live DB needed)
      - JWT_SECRET_KEY=ci-test-secret uv run pytest --cov
      # Validate Dockerfile builds (requires privileged mode)
      - docker build .
      # Frontend type check + build
      - npm --prefix apps/web run build

  build:
    on-failure: ABORT
    commands:
      # Single shell block so `exit 0` from the branch guard short-circuits
      # the entire deploy. Each `- |` is a separate sub-shell, so an early
      # exit from one block does NOT skip the next.
      - |
        set -e

        # Only deploy when merging/pushing to main.
        BRANCH="${CODEBUILD_WEBHOOK_HEAD_REF:-}"
        if [ "$BRANCH" != "refs/heads/main" ]; then
          echo "Branch is '$BRANCH' — skipping deploy (main only)"
          exit 0
        fi

        CMD_ID=$(aws ssm send-command \
          --region $AWS_REGION \
          --instance-ids $EC2_INSTANCE_ID \
          --document-name "AWS-RunShellScript" \
          --parameters '{"commands":[
            "set -e",
            "export HOME=/root",
            "git config --global --add safe.directory /home/ubuntu/multi-agentic-sales-representative-system",
            "cd /home/ubuntu/multi-agentic-sales-representative-system",
            "git fetch origin",
            "git reset --hard origin/main",
            "sudo docker container prune -f",
            "sudo docker compose build api sqs-worker",
            "sudo docker compose run --rm api uv run alembic upgrade head",
            "sudo docker compose up -d"
          ]}' \
          --output text \
          --query "Command.CommandId")
        echo "SSM command $CMD_ID dispatched"

        # 120 × 15s = 30 min. The image installs torch/transformers/spaCy and
        # pre-bakes HF models, so the first uncached build can take 10+ min.
        for i in $(seq 1 120); do
          STATUS=$(aws ssm get-command-invocation \
            --region $AWS_REGION \
            --command-id $CMD_ID \
            --instance-id $EC2_INSTANCE_ID \
            --query "Status" --output text 2>/dev/null || echo "Pending")
          echo "[$i/120] $STATUS"
          if [ "$STATUS" = "Success" ]; then exit 0; fi
          if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
            echo "=== STDOUT ==="
            aws ssm get-command-invocation \
              --region $AWS_REGION \
              --command-id $CMD_ID \
              --instance-id $EC2_INSTANCE_ID \
              --query "StandardOutputContent" --output text
            echo "=== STDERR ==="
            aws ssm get-command-invocation \
              --region $AWS_REGION \
              --command-id $CMD_ID \
              --instance-id $EC2_INSTANCE_ID \
              --query "StandardErrorContent" --output text
            exit 1
          fi
          sleep 15
        done
        echo "Timed out waiting for deploy"
        exit 1

cache:
  paths:
    - "/root/.cache/uv/**/*"
    - "/root/.cache/mypy/**/*"
    - "apps/web/node_modules/**/*"
    - "apps/web/.next/cache/**/*"
