version: 0.2

# Requires the CodeBuild project to have:
#   - Environment: LINUX_EC2 (Docker works natively, no privileged mode needed)
#   - Environment variables: AWS_REGION, EC2_INSTANCE_ID
#   - Optional environment variable: ECR_REPOSITORY_URI
#   - (Optional) S3 cache bucket configured to use the cache section below

phases:
  install:
    runtime-versions:
      python: "3.12"
      nodejs: "20"
    commands:
      - pip install uv --quiet
      - uv sync --extra dev --no-group dev
      - npm --prefix apps/web ci

  pre_build:
    on-failure: ABORT
    commands:
      - |
        set -e
        BRANCH="${CODEBUILD_WEBHOOK_HEAD_REF:-}"
        if [ -z "$BRANCH" ]; then
          case "${CODEBUILD_WEBHOOK_TRIGGER:-}" in
            branch/main) BRANCH="refs/heads/main" ;;
          esac
        fi
        if [ -z "$BRANCH" ]; then
          case "${CODEBUILD_SOURCE_VERSION:-}" in
            main|refs/heads/main) BRANCH="refs/heads/main" ;;
          esac
        fi
        echo "Branch is '${BRANCH:-unknown}'"
        echo "export CI_BRANCH='$BRANCH'" > /tmp/ci-env
      # Lint & format
      - uv run ruff check .
      - uv run ruff format --check .
      # Type check
      - uv run mypy apps packages workers
      # Tests (all mock-based, no live DB needed)
      - JWT_SECRET_KEY=ci-test-secret uv run pytest tests/ --ignore=tests/evals/ --cov
      # Run LangSmith evaluations only on main, before deployment.
      - |
        set -e
        . /tmp/ci-env
        if [ "$CI_BRANCH" = "refs/heads/main" ]; then
          uv run pytest tests/evals/
        else
          echo "Skipping LangSmith evaluations on non-main branch"
        fi
      # Frontend type check + build
      - npm --prefix apps/web run build

  build:
    on-failure: ABORT
    commands:
      # Single shell block so `exit 0` from the branch guard short-circuits
      # the entire deploy. Each `- |` is a separate sub-shell, so an early
      # exit from one block does NOT skip the next.
      - |
        set -e
        . /tmp/ci-env

        # Only deploy when merging/pushing to main.
        if [ "$CI_BRANCH" != "refs/heads/main" ]; then
          echo "Branch is '$CI_BRANCH' — skipping image build and deploy (main only)"
          exit 0
        fi

        : "${AWS_REGION:?AWS_REGION is required}"
        : "${EC2_INSTANCE_ID:?EC2_INSTANCE_ID is required}"

        if [ -z "${ECR_REPOSITORY_URI:-}" ]; then
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REPOSITORY_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/salesrep-api"
          echo "ECR_REPOSITORY_URI not set; using $ECR_REPOSITORY_URI"
        fi

        if ! aws ecr describe-repositories \
          --region "$AWS_REGION" \
          --repository-names "${ECR_REPOSITORY_URI##*/}" >/dev/null 2>&1; then
          echo "ECR repository '${ECR_REPOSITORY_URI##*/}' does not exist or CodeBuild cannot access it."
          echo "Create it once, then rerun:"
          echo "  aws ecr create-repository --region $AWS_REGION --repository-name ${ECR_REPOSITORY_URI##*/}"
          exit 1
        fi

        IMAGE_TAG="${CODEBUILD_RESOLVED_SOURCE_VERSION:-latest}"
        API_IMAGE="$ECR_REPOSITORY_URI:$IMAGE_TAG"
        CACHE_IMAGE="$ECR_REPOSITORY_URI:buildcache"
        ECR_REGISTRY="${ECR_REPOSITORY_URI%/*}"

        aws ecr get-login-password --region "$AWS_REGION" \
          | docker login --username AWS --password-stdin "$ECR_REGISTRY"

        docker buildx create --use --name salesrep-builder 2>/dev/null || docker buildx use salesrep-builder
        docker buildx build \
          --cache-from "type=registry,ref=$CACHE_IMAGE" \
          --cache-to "type=registry,ref=$CACHE_IMAGE,mode=max" \
          --tag "$API_IMAGE" \
          --push \
          .

        CMD_ID=$(aws ssm send-command \
          --region "$AWS_REGION" \
          --instance-ids "$EC2_INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --parameters '{"commands":[
            "set -e",
            "export HOME=/root",
            "git config --global --add safe.directory /home/ubuntu/multi-agentic-sales-representative-system",
            "cd /home/ubuntu/multi-agentic-sales-representative-system",
            "git fetch origin",
            "git reset --hard origin/main",
            "export API_IMAGE='"$API_IMAGE"'",
            "export ECR_REGISTRY='"$ECR_REGISTRY"'",
            "sudo docker container prune -f",
            "aws ecr get-login-password --region '"$AWS_REGION"' | sudo docker login --username AWS --password-stdin $ECR_REGISTRY",
            "sudo -E docker compose -f docker-compose.prod.yml --profile worker pull api sqs-worker",
            "sudo -E docker compose -f docker-compose.prod.yml run --rm api uv run alembic upgrade head",
            "sudo -E docker compose -f docker-compose.prod.yml --profile worker up -d"
          ]}' \
          --output text \
          --query "Command.CommandId")
        echo "SSM command $CMD_ID dispatched"

        print_invocation() {
          echo "=== SSM STATUS DETAILS ==="
          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$CMD_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "{Status:Status,ResponseCode:ResponseCode,StatusDetails:StatusDetails}" \
            --output table || true
          echo "=== STDOUT ==="
          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$CMD_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "StandardOutputContent" --output text || true
          echo "=== STDERR ==="
          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$CMD_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "StandardErrorContent" --output text || true
        }

        # 80 × 15s = 20 min. The image is built and pushed by CodeBuild; EC2
        # should only pull, migrate, and restart.
        LAST_STATUS=""
        for i in $(seq 1 80); do
          STATUS=$(aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$CMD_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "Status" --output text 2>/dev/null || echo "Pending")
          if [ "$STATUS" != "$LAST_STATUS" ]; then
            echo "[$i/80] $STATUS"
            LAST_STATUS="$STATUS"
          fi
          if [ "$STATUS" = "Success" ]; then exit 0; fi
          case "$STATUS" in
            Failed|Cancelled|TimedOut|Cancelling|Undeliverable|Terminated|DeliveryTimedOut|ExecutionTimedOut)
              print_invocation
              exit 1
              ;;
          esac
          sleep 15
        done
        echo "Timed out waiting for deploy"
        print_invocation
        exit 1

cache:
  paths:
    - "/root/.cache/uv/**/*"
    - "/root/.cache/mypy/**/*"
    - "/root/.npm/**/*"
    - "apps/web/node_modules/**/*"
    - "apps/web/.next/cache/**/*"
